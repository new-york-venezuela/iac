---
# =============================================================================
# Mailcow
# =============================================================================
# Prerequisites:
#   ansible-galaxy install -r ansible/requirements.yml   # collections + mailcow role
#
# Run:
#   ansible-playbook -i ansible/inventory.ini ansible/playbook.yml \
#     -e domain=acmecorp.com \
#     -e admin_email=admin@acmecorp.com \
#     -e timezone=Europe/Berlin
#
# All vars below have sensible defaults; override via -e or group_vars/all.yml.
# =============================================================================

- name: Mailcow
  hosts: mailserver
  become: true

  vars:
    # -- Company / domain settings (override per deployment) --
    domain: "alimentosnewyork.com"
    admin_email: "it@alimentosnewyork.com"
    timezone: "America/Caracas"

    # -- Derived values --
    mail_hostname: "mail.{{ domain }}"

    # -- Paths --
    mailcow_dir: /opt/mailcow-dockerized
    volume_mount: /mnt/mailcow-data
    backup_dir: /mnt/mailcow-data/backups

    # -- Mailcow tuning --
    skip_clamd: "n"      # Disable ClamAV; set to "n" if RAM > 8 GB
    skip_rspamd: "n"
    mailcow_branch: "2026-05c"

    # -- Docker --
    docker_log_max_size: "50m"
    docker_log_max_file: "3"

    # -- mailcow.mailcow role wiring (see ansible/requirements.yml) --
    mailcow__hostname: "{{ mail_hostname }}"
    mailcow__timezone: "{{ timezone }}"
    mailcow__install_path: "{{ mailcow_dir }}"
    mailcow__git_version: "{{ mailcow_branch }}"
    # Let mailcow's acme-mailcow handle TLS directly
    mailcow__config_skip_lets_encrypt: "n"
    mailcow__config_skip_clamd: "{{ skip_clamd }}"
    # On re-runs against a running stack, apply mailcow's official update.sh
    mailcow__install_updates: true

  handlers:
    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted

  # ===========================================================================
  # BLOCK 1 — Host hardening & prep
  # ===========================================================================
  tasks:
    - name: "PREP | Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: prep

    - name: "PREP | Install baseline packages"
      ansible.builtin.apt:
        name:
          - git
          - curl
          - rsync
          - rclone
          - ca-certificates
          - gnupg
          - apt-transport-https
          - python3-pip
          - python3-requests   # needed by community.docker modules (mailcow role)
          - python3-venv
          - nftables
          - fail2ban
          - unattended-upgrades
          - jq
        state: present
      tags: prep

    - name: "PREP | Enable automatic security updates"
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        mode: "0644"
      tags: prep

    - name: "PREP | Check if swapfile already exists"
      ansible.builtin.stat:
        path: /swapfile
      register: swapfile_stat
      tags: prep

    - name: "PREP | Allocate 4 GB swapfile"
      ansible.builtin.command:
        cmd: fallocate -l 4G /swapfile
      when: not swapfile_stat.stat.exists
      changed_when: true
      tags: prep

    - name: "PREP | Lock down swapfile permissions"
      ansible.builtin.file:
        path: /swapfile
        owner: root
        group: root
        mode: "0600"
      tags: prep

    - name: "PREP | Format swapfile"
      ansible.builtin.command:
        cmd: mkswap /swapfile
      when: not swapfile_stat.stat.exists
      changed_when: true
      tags: prep

    - name: "PREP | Enable swapfile"
      ansible.builtin.command:
        cmd: swapon /swapfile
      when: not swapfile_stat.stat.exists
      register: swapon_result
      failed_when: swapon_result.rc != 0
      changed_when: true
      tags: prep

    - name: "PREP | Persist swapfile in fstab"
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present
      tags: prep

    - name: "PREP | Set vm.swappiness to 10 (reduce swap pressure)"
      ansible.posix.sysctl:
        name: vm.swappiness
        value: "10"
        state: present
        sysctl_set: true
      tags: prep

  # ===========================================================================
  # BLOCK 2 — Volume mount (device path injected by Terraform → inventory.ini)
  # ===========================================================================
    - name: "VOLUME | Install filesystem utilities"
      ansible.builtin.apt:
        name: e2fsprogs
        state: present
      tags: volume

    - name: "VOLUME | Create ext4 filesystem on volume (idempotent)"
      community.general.filesystem:
        fstype: ext4
        dev: "{{ volume_device }}"
        opts: "-L mailcow-data"
      tags: volume

    - name: "VOLUME | Create mount point"
      ansible.builtin.file:
        path: "{{ volume_mount }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      tags: volume

    - name: "VOLUME | Mount volume and persist in fstab"
      ansible.posix.mount:
        path: "{{ volume_mount }}"
        src: "{{ volume_device }}"
        fstype: ext4
        opts: "defaults,nofail"
        state: mounted
      tags: volume

    - name: "VOLUME | Create Docker data-root dir on volume"
      ansible.builtin.file:
        path: "{{ volume_mount }}/docker"
        state: directory
        owner: root
        group: root
        mode: "0711"
      tags: volume

    - name: "VOLUME | Create backup dir on volume"
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0750"
      tags: volume

  # ===========================================================================
  # BLOCK 3 — Docker installation
  # Docker's data-root is configured to the volume BEFORE Docker starts so
  # all container/volume data lands on persistent storage from day one.
  # ===========================================================================
    - name: "DOCKER | Create apt keyring directory"
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: docker

    - name: "DOCKER | Create /etc/docker config directory"
      ansible.builtin.file:
        path: /etc/docker
        state: directory
        mode: "0755"
      tags: docker

    - name: "DOCKER | Download Docker GPG key"
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags: docker

    - name: "DOCKER | Add Docker apt repository"
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker
      tags: docker

    - name: "DOCKER | Configure daemon (log rotation + data-root on volume)"
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "data-root": "{{ volume_mount }}/docker",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "{{ docker_log_max_size }}",
              "max-file": "{{ docker_log_max_file }}"
            }
          }
        mode: "0644"
      notify: Restart Docker
      tags: docker

    - name: "DOCKER | Install Docker packages"
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      tags: docker

    - name: "DOCKER | Enable and start Docker"
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      tags: docker

    - name: "DOCKER | Flush handlers (ensure Docker is up with correct data-root)"
      ansible.builtin.meta: flush_handlers
      tags: docker

  # ===========================================================================
  # BLOCK 4 — Mailcow provisioning (official mailcow.mailcow role)
  # The role clones mailcow-dockerized, generates mailcow.conf, applies the
  # mailcow__config_* settings from vars above, starts the compose stack on
  # fresh installs, and runs mailcow's update.sh on subsequent runs.
  # Docker must already be installed (BLOCK 3).
  # ===========================================================================
    - name: "MAILCOW | Provision via official mailcow role"
      ansible.builtin.import_role:
        name: mailcow.mailcow
      tags: mailcow, deploy

  # ===========================================================================
  # BLOCK 5 — Backups
  # Mailcow ships backup_and_restore.sh; we wire it into a daily cron job.
  # rclone offsite push is documented in INSTRUCTIONS.md (requires cloud creds).
  # ===========================================================================
    - name: "BACKUP | Install daily Mailcow backup cron job"
      ansible.builtin.cron:
        name: "Mailcow daily backup"
        user: root
        hour: "2"
        minute: "30"
        job: >-
          MAILCOW_BACKUP_LOCATION={{ backup_dir }}
          {{ mailcow_dir }}/helper-scripts/backup_and_restore.sh backup all
          >> /var/log/mailcow-backup.log 2>&1
        state: present
      tags: backup

    - name: "BACKUP | Install weekly backup pruner (keep 7 days)"
      ansible.builtin.cron:
        name: "Mailcow backup pruner"
        user: root
        weekday: "0"
        hour: "4"
        minute: "0"
        job: >-
          find {{ backup_dir }} -type d -mtime +7
          -exec rm -rf {} + >> /var/log/mailcow-backup.log 2>&1
        state: present
      tags: backup

    - name: "BACKUP | Deploy rclone config template (edit to add remote credentials)"
      ansible.builtin.copy:
        dest: /root/.config/rclone/rclone.conf
        content: |
          # ============================================================
          # rclone remote for offsite backup — fill in your credentials
          # ============================================================
          # Example for Backblaze B2:
          #
          # [b2]
          # type = b2
          # account = YOUR_ACCOUNT_ID
          # key = YOUR_APPLICATION_KEY
          #
          # Then add to cron:
          # 0 5 * * * rclone sync {{ backup_dir }} b2:your-bucket-name/mailcow/
          # ============================================================
        mode: "0600"
        force: false     # Never overwrite if user has already configured it
      tags: backup
